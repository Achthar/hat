<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1e3a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg2)"/>

  <!-- Glow orbs -->
  <circle cx="500" cy="150" r="140" fill="#2563eb" opacity="0.08" filter="url(#glow2)"/>
  <circle cx="50" cy="280" r="100" fill="#06b6d4" opacity="0.06" filter="url(#glow2)"/>

  <!-- Subtle diagonal lines -->
  <g stroke="rgba(59,130,246,0.04)" stroke-width="1">
    <line x1="0" y1="300" x2="200" y2="0"/>
    <line x1="100" y1="300" x2="300" y2="0"/>
    <line x1="200" y1="300" x2="400" y2="0"/>
    <line x1="300" y1="300" x2="500" y2="0"/>
    <line x1="400" y1="300" x2="600" y2="0"/>
  </g>

  <!-- USDC coin -->
  <g transform="translate(460, 150)">
    <circle r="76" fill="rgba(37,99,235,0.1)"/>
    <circle r="60" fill="url(#blue)" opacity="0.15"/>
    <circle r="60" fill="none" stroke="url(#blue)" stroke-width="2.5"/>
    <!-- Dollar sign -->
    <text x="0" y="8" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="url(#blue)">$</text>
    <!-- Inner ring -->
    <circle r="46" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- Orbiting dots -->
    <circle cx="60" cy="0" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="-42" cy="42" r="3" fill="#06b6d4" opacity="0.4"/>
    <circle cx="30" cy="-52" r="3" fill="#3b82f6" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="48" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#3b82f6" letter-spacing="3" opacity="0.8">CIRCLE</text>
  <text x="48" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white">USDC on Arc</text>
  <text x="48" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#93c5fd" opacity="0.7">Digital dollars. Instant settlement.</text>

  <!-- CTA -->
  <rect x="48" y="190" width="140" height="42" rx="12" fill="url(#blue)"/>
  <text x="84" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Learn More</text>

  <!-- Stats row -->
  <g transform="translate(48, 258)">
    <text font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="white">$44B+</text>
    <text x="85" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" dy="0">in</text>
    <text x="85" y="14" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">circulation</text>
    <text x="160" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="white">0.01s</text>
    <text x="232" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" dy="0">settlement</text>
    <text x="232" y="14" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">on Arc</text>
  </g>
</svg>
