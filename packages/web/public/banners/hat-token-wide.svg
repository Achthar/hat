<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0b2e"/>
      <stop offset="100%" stop-color="#1a0f3c"/>
    </linearGradient>
    <linearGradient id="ind" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="g3"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <rect width="728" height="90" rx="8" fill="url(#bg3)"/>
  <circle cx="660" cy="30" r="50" fill="#6366f1" opacity="0.1" filter="url(#g3)"/>
  <circle cx="600" cy="70" r="30" fill="#fbbf24" opacity="0.06" filter="url(#g3)"/>
  <!-- HAT logo -->
  <g transform="translate(50, 45)">
    <circle r="26" fill="url(#ind)" opacity="0.1"/>
    <circle r="22" fill="rgba(15,11,46,0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <g fill="#fb7185" opacity="0.7"><rect x="-10" y="-9" width="3" height="18" rx="1"/><rect x="-10" y="-1" width="20" height="3" rx="1"/><rect x="7" y="-9" width="3" height="18" rx="1"/></g>
    <g fill="#fbbf24" opacity="0.7"><rect x="-10" y="-9" width="20" height="3" rx="1"/><rect x="-1.5" y="-9" width="3" height="18" rx="1"/></g>
    <g fill="white" opacity="0.95"><rect x="-10" y="-9" width="3" height="18" rx="1"/><rect x="7" y="-9" width="3" height="18" rx="1"/><rect x="-10" y="-9" width="20" height="3" rx="1"/><rect x="-10" y="-1" width="20" height="3" rx="1"/></g>
  </g>
  <!-- Text -->
  <text x="90" y="36" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#fbbf24" opacity="0.6">EARN</text>
  <text x="90" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="white">HAT Token</text>
  <!-- Pills -->
  <rect x="320" y="30" width="80" height="26" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
  <circle cx="334" cy="43" r="3" fill="#fbbf24"/><text x="342" y="47" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">USDC+HAT</text>
  <rect x="410" y="30" width="88" height="26" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
  <circle cx="424" cy="43" r="3" fill="#22c55e"/><text x="432" y="47" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">Humans Only</text>
  <!-- CTA -->
  <rect x="590" y="25" width="110" height="40" rx="10" fill="url(#ind)"/>
  <text x="604" y="51" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Start Earning</text>
</svg>
