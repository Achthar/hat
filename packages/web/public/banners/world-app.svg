<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0b2e"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg)"/>

  <!-- Decorative blurred orbs -->
  <circle cx="480" cy="60" r="120" fill="#6366f1" opacity="0.15" filter="url(#glow1)"/>
  <circle cx="100" cy="260" r="80" fill="#fb7185" opacity="0.1" filter="url(#glow1)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/>
  </g>

  <!-- World orb icon -->
  <g transform="translate(420, 150)">
    <circle r="72" fill="url(#orb)" opacity="0.2"/>
    <circle r="52" fill="none" stroke="url(#orb)" stroke-width="2"/>
    <circle r="52" fill="url(#shine)"/>
    <!-- Globe lines -->
    <ellipse rx="52" ry="52" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <ellipse rx="30" ry="52" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <ellipse rx="12" ry="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <line x1="-52" y1="0" x2="52" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="-48" y1="-26" x2="48" y2="-26" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <line x1="-48" y1="26" x2="48" y2="26" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <!-- Eye -->
    <circle r="14" fill="#6366f1"/>
    <circle r="6" fill="#fff"/>
  </g>

  <!-- Text -->
  <text x="48" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="white">World App</text>
  <text x="48" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#a5b4fc" opacity="0.8">Proof of Human Identity</text>

  <!-- CTA button -->
  <rect x="48" y="170" width="160" height="44" rx="12" fill="url(#orb)"/>
  <rect x="48" y="170" width="160" height="22" rx="12" fill="url(#shine)"/>
  <text x="93" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Get Verified</text>

  <!-- Badge -->
  <rect x="48" y="236" width="90" height="24" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="64" cy="248" r="4" fill="#22c55e"/>
  <text x="74" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">Trusted</text>
</svg>
