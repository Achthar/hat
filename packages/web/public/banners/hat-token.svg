<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0b2e"/>
      <stop offset="50%" stop-color="#1a0f3c"/>
      <stop offset="100%" stop-color="#0f0b2e"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pinkGr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg3)"/>

  <!-- Background orbs -->
  <circle cx="460" cy="80" r="100" fill="#6366f1" opacity="0.12" filter="url(#glow3)"/>
  <circle cx="520" cy="240" r="80" fill="#fbbf24" opacity="0.08" filter="url(#glow3)"/>
  <circle cx="350" cy="200" r="60" fill="#fb7185" opacity="0.06" filter="url(#glow3)"/>

  <!-- HAT Logo -->
  <g transform="translate(430, 130)">
    <!-- Outer glow ring -->
    <circle r="80" fill="url(#indigo)" opacity="0.08"/>
    <circle r="64" fill="rgba(15,11,46,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

    <!-- H — rose -->
    <g fill="#fb7185" opacity="0.7">
      <rect x="-28" y="-24" width="7" height="48" rx="2"/>
      <rect x="-28" y="-3" width="56" height="7" rx="2"/>
      <rect x="21" y="-24" width="7" height="48" rx="2"/>
    </g>
    <!-- T — amber -->
    <g fill="#fbbf24" opacity="0.7">
      <rect x="-28" y="-24" width="56" height="7" rx="2"/>
      <rect x="-3.5" y="-24" width="7" height="48" rx="2"/>
    </g>
    <!-- A — white -->
    <g fill="white" opacity="0.95">
      <rect x="-28" y="-24" width="7" height="48" rx="2"/>
      <rect x="21" y="-24" width="7" height="48" rx="2"/>
      <rect x="-28" y="-24" width="56" height="7" rx="2"/>
      <rect x="-28" y="-3" width="56" height="7" rx="2"/>
    </g>

    <!-- Orbiting particles -->
    <circle cx="64" cy="0" r="3" fill="#fbbf24" opacity="0.5"/>
    <circle cx="-50" cy="45" r="2.5" fill="#fb7185" opacity="0.4"/>
    <circle cx="40" cy="-56" r="2" fill="#818cf8" opacity="0.4"/>
  </g>

  <!-- Text -->
  <text x="48" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" letter-spacing="3" opacity="0.5" fill="#fbbf24">EARN</text>
  <text x="48" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" fill="white">HAT Token</text>
  <text x="48" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#c7d2fe" opacity="0.7">Your attention has value.</text>

  <!-- CTA button with gradient -->
  <rect x="48" y="176" width="180" height="44" rx="12" fill="url(#indigo)"/>
  <text x="89" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Start Earning</text>

  <!-- Metric pills -->
  <g transform="translate(48, 244)">
    <rect width="100" height="30" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="16" cy="15" r="4" fill="#fbbf24"/>
    <text x="26" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.6)">USDC + HAT</text>

    <rect x="112" width="110" height="30" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="128" cy="15" r="4" fill="#22c55e"/>
    <text x="138" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.6)">Humans Only</text>
  </g>
</svg>
