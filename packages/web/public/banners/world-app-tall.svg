<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0b2e"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="160" height="600" rx="8" fill="url(#bg)"/>
  <circle cx="80" cy="60" r="80" fill="#6366f1" opacity="0.1" filter="url(#g)"/>
  <circle cx="40" cy="500" r="60" fill="#fb7185" opacity="0.06" filter="url(#g)"/>

  <!-- Globe icon -->
  <g transform="translate(80, 120)">
    <circle r="48" fill="url(#orb)" opacity="0.12"/>
    <circle r="36" fill="none" stroke="url(#orb)" stroke-width="2"/>
    <ellipse rx="20" ry="36" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
    <ellipse rx="8" ry="36" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <line x1="-36" y1="0" x2="36" y2="0" stroke="rgba(255,255,255,0.08)"/>
    <line x1="-32" y1="-18" x2="32" y2="-18" stroke="rgba(255,255,255,0.05)"/>
    <line x1="-32" y1="18" x2="32" y2="18" stroke="rgba(255,255,255,0.05)"/>
    <circle r="10" fill="#6366f1"/>
    <circle r="4" fill="#fff"/>
  </g>

  <!-- Text -->
  <text x="80" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="white">World</text>
  <text x="80" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="white">App</text>
  <text x="80" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a5b4fc" opacity="0.7">Proof of Human</text>
  <text x="80" y="284" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a5b4fc" opacity="0.7">Identity</text>

  <!-- Decorative dots -->
  <circle cx="40" cy="330" r="2" fill="#818cf8" opacity="0.3"/>
  <circle cx="80" cy="330" r="2" fill="#818cf8" opacity="0.2"/>
  <circle cx="120" cy="330" r="2" fill="#818cf8" opacity="0.3"/>

  <!-- CTA -->
  <rect x="20" y="360" width="120" height="44" rx="12" fill="url(#orb)"/>
  <text x="80" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Get Verified</text>

  <!-- Badge -->
  <rect x="36" y="430" width="88" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="52" cy="444" r="4" fill="#22c55e"/>
  <text x="62" y="449" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.45)">Trusted</text>

  <!-- Bottom decoration -->
  <line x1="30" y1="540" x2="130" y2="540" stroke="rgba(255,255,255,0.04)"/>
  <text x="80" y="565" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">world.org</text>
</svg>
