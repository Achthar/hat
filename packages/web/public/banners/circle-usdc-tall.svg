<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c1e3a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="g2"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="160" height="600" rx="8" fill="url(#bg2)"/>
  <circle cx="80" cy="50" r="70" fill="#2563eb" opacity="0.08" filter="url(#g2)"/>
  <circle cx="120" cy="500" r="50" fill="#06b6d4" opacity="0.05" filter="url(#g2)"/>

  <!-- USDC coin -->
  <g transform="translate(80, 120)">
    <circle r="50" fill="rgba(37,99,235,0.08)"/>
    <circle r="40" fill="none" stroke="url(#bl)" stroke-width="2"/>
    <circle r="30" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
    <text y="8" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="url(#bl)">$</text>
    <circle cx="40" cy="0" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="-28" cy="28" r="2" fill="#06b6d4" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="80" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="2" opacity="0.7">CIRCLE</text>
  <text x="80" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="white">USDC</text>
  <text x="80" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="white">on Arc</text>
  <text x="80" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#93c5fd" opacity="0.6">Digital dollars.</text>
  <text x="80" y="308" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#93c5fd" opacity="0.6">Instant settlement.</text>

  <!-- Stats -->
  <rect x="20" y="340" width="120" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  <text x="80" y="362" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="800" fill="white">$44B+</text>
  <text x="80" y="380" text-anchor="middle" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)">in circulation</text>

  <rect x="20" y="400" width="120" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  <text x="80" y="422" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="800" fill="white">0.01s</text>
  <text x="80" y="440" text-anchor="middle" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)">settlement on Arc</text>

  <!-- CTA -->
  <rect x="20" y="480" width="120" height="44" rx="12" fill="url(#bl)"/>
  <text x="80" y="508" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Learn More</text>

  <text x="80" y="565" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">circle.com</text>
</svg>
