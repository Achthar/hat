<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Coin body -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="224" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="220" cy="200" r="160" fill="white" opacity="0.06"/>

  <!-- Letters truly centered: w=190, h=180, centered at (256,246) — nudged 10px up to optically balance with text below -->
  <!-- box: x=161..351, y=156..336, bar=24 -->
  <g filter="url(#glow)">

    <!-- H — rose/pink -->
    <g fill="#fb7185" opacity="0.85">
      <rect x="161" y="156" width="24" height="180" rx="7"/>
      <rect x="161" y="234" width="190" height="24" rx="7"/>
      <rect x="327" y="156" width="24" height="180" rx="7"/>
    </g>

    <!-- T — amber/gold -->
    <g fill="#fbbf24" opacity="0.85">
      <rect x="161" y="156" width="190" height="24" rx="7"/>
      <rect x="244" y="156" width="24" height="180" rx="7"/>
    </g>

    <!-- A — white -->
    <g fill="white" opacity="0.95">
      <rect x="161" y="156" width="24" height="180" rx="7"/>
      <rect x="327" y="156" width="24" height="180" rx="7"/>
      <rect x="161" y="156" width="190" height="24" rx="7"/>
      <rect x="161" y="234" width="190" height="24" rx="7"/>
    </g>

  </g>

  <!-- Text arc below letters -->
  <path id="bottomArc" d="M 80,355 A 205,205 0 0,0 432,355" fill="none"/>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="19" letter-spacing="4.5" opacity="0.85">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      <tspan fill="#c7d2fe">HUMAN ATTENTION </tspan><tspan fill="#fbbf24">TOKEN</tspan>
    </textPath>
  </text>
</svg>
